name: Mirror and Deploy from Repo A

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Required for deploying to Pages
      id-token: write   # Required for authentication
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repo A (Private)
        uses: actions/checkout@v4
        with:
          repository: Heatthunder/Text-Adventure-Game-REBUILT
          token: ${{ secrets.REPO_PAT_KEY }}
          # Put files in the root so the artifact uploader can find them
          path: . 

      - name: Debug - List Files
        run: ls -R

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Since there's no "dist" folder, we upload the whole repository
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
