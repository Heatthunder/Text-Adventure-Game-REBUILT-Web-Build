name: Mirror and Deploy from Repo A

on:
  schedule:
    - cron: "*/30 * * * *"   # Runs every 30 minutes
  workflow_dispatch:        # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo A (Private)
        uses: actions/checkout@v4
        with:
          repository: Heatthunder/Text-Adventure-Game-REBUILT
          token: ${{ secrets.REPO_PAT_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 
          # Removed the cache line to prevent the "lock file not found" error

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: Verify if your project builds to 'dist', 'build', or 'out'
          path: ./dist 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      
      id-token: write   
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
