name: Mirror and Deploy from Repo A

on:
  schedule:
    - cron: "*/30 * * * *"   # Runs every 30 minutes
  workflow_dispatch:        # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo A (Private)
        uses: actions/checkout@v4
        with:
          repository: Heatthunder/Text-Adventure-Game-REBUILT
          # Using your specific secret name here
          token: ${{ secrets.REPO_PAT_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Standard stable version
          cache: 'npm'       # Speeds up future runs by caching dependencies

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # If your build folder is named something else (like 'build'), change this:
          path: ./dist 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Required for deploying to Pages
      id-token: write   # Required for authentication
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
