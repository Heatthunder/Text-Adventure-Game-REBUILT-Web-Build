name: Mirror and Deploy from Repo A

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Private Game Repo
        uses: actions/checkout@v4
        with:
          repository: Heatthunder/Text-Adventure-Game-REBUILT
          token: ${{ secrets.REPO_PAT_KEY }}
          path: .
          clean: true

      - name: Prepare Files for Deployment
        # We copy the contents of web/ to the root so index.html is found,
        # but we keep all other folders exactly where they are.
        run: |
          cp -r web/* .
          echo "Files prepared. Final root structure:"
          ls -F

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire root directory (everything)
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
