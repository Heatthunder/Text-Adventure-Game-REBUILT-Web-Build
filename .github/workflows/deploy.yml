name: Mirror and Deploy from Repo A

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo A (Private)
        uses: actions/checkout@v4
        with:
          repository: Heatthunder/Text-Adventure-Game-REBUILT
          token: ${{ secrets.REPO_PAT_KEY }}
          path: .  # <--- THIS IS THE FIX: Forces code into the root directory

      # DEBUG STEP: This helps us see why files are "missing"
      - name: List files in the repository
        run: ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      
      id-token: write   
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
