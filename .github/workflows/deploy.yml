name: Mirror and Deploy from Repo A

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

# This tells GitHub to use the newer Node.js 24 engine for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repo A (Private)
        uses: actions/checkout@v4
        with:
          repository: Heatthunder/Text-Adventure-Game-REBUILT
          token: ${{ secrets.REPO_PAT_KEY }}
          path: . 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
